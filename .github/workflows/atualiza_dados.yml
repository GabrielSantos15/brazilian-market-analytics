name: Atualizar Cotações B3

on:
  schedule:
    # Roda de Segunda a Sexta às 21:30 UTC (18:30 no Horário de Brasília)
    - cron: '30 21 * * 1-5'
  
  # Esse comando cria um botão "Run workflow" no GitHub pra você rodar na mão
  workflow_dispatch: 

jobs:
  etl-b3:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do Repositório
        uses: actions/checkout@v4
        with:
          ref: dados-producao
          
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar Dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Executar Script de Extração Python
        run: python extrator.py

      - name: Commitar e Salvar os CSVs na pasta dados
        run: |
          # Configura a identidade padrão de Bot do GitHub
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Adiciona os DOIS arquivos CSVs novos que estão dentro da pasta dados
          git add dados/f_historico_precos.csv dados/f_dividendos.csv dados/ultima_atualizacao.csv
          
          # Se houve mudança, ele commita e envia. Se os preços forem os mesmos, ele não faz nada.
          git diff --quiet && git diff --staged --quiet || (git commit -m "ETL Bot: Histórico e dividendos atualizados" && git push)
